[pytest]
# SimAnt is the sole target right now.  By default pytest collects only SimAnt's
# tests plus the game-AGNOSTIC framework tests SimAnt itself relies on (the
# selector/local heaps, MessageBox, child-window compositor, audio math).
#
# The other games' tests (ppython, microman, and the ppython/microman-specific
# tests under tests/) are intentionally NOT collected — per the current
# directive they may break without blocking SimAnt work.  To run them anyway:
#     pytest microman/tests tests
testpaths =
    simant/tests
    tests/test_compositor.py
    tests/test_audio.py
    tests/test_hugeheap.py
    tests/test_localheap.py
    tests/test_msgbox.py
