[pytest]
# SimAnt is the sole target.  The gate is SimAnt's own tests plus the
# game-AGNOSTIC win16/ framework tests it relies on (the selector/local heaps,
# MessageBox, child-window compositor, audio math).  The other games this
# framework was hardened on have been moved to a separate project.
testpaths =
    simant/tests
    tests/test_compositor.py
    tests/test_colorref.py
    tests/test_blit.py
    tests/test_interactive_pause.py
    tests/test_audio.py
    tests/test_hugeheap.py
    tests/test_localheap.py
    tests/test_msgbox.py
