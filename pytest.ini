[pytest]
# win16_re is the game-agnostic Win16 framework — no game package lives here.
# This is the framework's own test suite (selector/local heaps, MessageBox,
# child-window compositor, audio math, NE loader/relocations). Game-port
# projects (e.g. simant_port) vendor this repo as a submodule and run their
# own game-specific suite (which includes lifted-island A/B oracles) against it.
testpaths =
    tests
